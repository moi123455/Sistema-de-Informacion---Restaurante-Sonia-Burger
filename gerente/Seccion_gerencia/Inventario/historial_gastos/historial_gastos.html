<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Historial de Cierres de Gastos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="estilos_historial.css" rel="stylesheet">
</head>
<body>
  <header class="bg-dark text-white py-2">
    <div class="container d-flex justify-content-between align-items-center">
      <img src="logo.png" alt="Logo" class="cajero-logo" />
      <h1 class="h5 m-0">Historial de Cierres de Gastos</h1>
      <div>
        
        <a href="../inventario.html" class="btn btn-sm btn-secondary">Volver a Inventario</a>
      </div>
    </div>
  </header>

  <main class="container my-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <div>
        <button id="btnRefrescarReportes" class="btn btn-outline-primary btn-sm">Refrescar</button>
        <button id="btnDescargarTodos" class="btn btn-outline-success btn-sm ms-2">Descargar CSV (todos)</button>
      </div>
      <div class="input-group input-group-sm" style="max-width:360px;">
        <input id="filtroBusqueda" type="search" class="form-control" placeholder="Buscar por título o fecha">
        <button id="btnBuscar" class="btn btn-outline-secondary">Buscar</button>
      </div>
    </div>

    <div id="listaReportes" class="list-group shadow-sm">
      <!-- Lista de reportes cargada dinámicamente -->
    </div>

    <div id="sinReportes" class="text-muted mt-3 d-none">No hay cierres registrados aún.</div>
  </main>

  <!-- Modal: Detalle de reporte -->
  <div class="modal fade" id="modalReporte" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 id="modalReporteTitulo" class="modal-title">Reporte</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>
        <div class="modal-body">
          <div class="mb-2 d-flex justify-content-between align-items-center">
            <div>
              <div><strong>Total USD:</strong> <span id="modalReporteTotalUsd">$0.00</span></div>
              <div><strong>Total Bs:</strong> <span id="modalReporteTotalBs">Bs 0.00</span></div>
            </div>
            <div>
              <button id="btnDescargarReporte" class="btn btn-sm btn-outline-success">Descargar CSV</button>
              <button id="btnImprimirReporte" class="btn btn-sm btn-outline-secondary ms-2">Imprimir</button>
            </div>
          </div>

          <div id="modalReporteBody" class="table-responsive">
            <table class="table table-sm table-striped mb-0">
              <thead>
                <tr>
                  <th>Nombre</th>
                  <th class="text-end">Cantidad</th>
                  <th>Unidad</th>
                  <th class="text-end">Costo unitario (USD)</th>
                  <th class="text-end">Total (USD)</th>
                  <th class="text-end">Total (Bs)</th>
                  <th class="text-center">Tasa</th>
                  <th>Proveedor</th>
                  <th>Fecha/Hora</th>
                </tr>
              </thead>
              <tbody id="modalReporteItems">
                <!-- Items -->
              </tbody>
            </table>
          </div>
        </div>
        <div class="modal-footer">
          <small class="text-muted me-auto" id="modalReporteNotas"></small>
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app_historial.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
