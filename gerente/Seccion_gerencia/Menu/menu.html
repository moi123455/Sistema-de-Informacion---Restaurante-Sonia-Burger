<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gestión del Menú</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
</head>
<body>
  <!-- Header -->
  <header>
    <div class="header-container d-flex justify-content-between align-items-center px-3 py-2 bg-dark text-white">
      <img src="logo.png" alt="Logo" class="cajero-logo" />
      <a href="/Restaurante_Sonia_Burger/Restaurante_SB/gerente/Seccion_gerencia/gerente.html"
         class="btn btn-secondary btn-sm">Volver</a>

      <h1 class="header-title text-center flex-grow-1 fs-4 m-0">Gestión del Menú</h1>

      <div class="d-flex align-items-center">
        <span id="userName" class="fw-bold me-2"></span>
        <span id="roleBadge" class="badge me-3"></span>
        <button id="btnLogout" class="btn btn-danger btn-sm">Cerrar sesión</button>
      </div>
    </div>
  </header>

  <!-- Main container -->
  <div class="container mt-4">
    <!-- Central register area (title above, button centered) -->
    <div class="page-header">
      <div class="register-area w-100 d-flex flex-column align-items-center">
        <h2 class="mb-2">Productos</h2>
        <div class="d-flex align-items-center gap-2">
          <select id="filtroHorario" class="form-select w-auto">
            <option value="dia">Menú del día (mañana)</option>
            <option value="tarde">Menú de tarde</option>
            <option value="noche">Menú de noche</option>
          </select>
          <button id="btnAbrirRegistro" class="btn btn-success" data-bs-toggle="modal" data-bs-target="#modalRegistroMenu">Registrar Producto</button>
        </div>
      </div>
    </div>

    <!-- Contenedor de recuadros por categoría (app.js inyecta secciones y tarjetas) -->
    <div id="contenedorPlatos" class="mt-3"></div>
  </div>

  <!-- Modal: Registrar Producto -->
  <div class="modal fade" id="modalRegistroMenu" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <form id="formRegistroMenu" class="modal-content" enctype="multipart/form-data" autocomplete="off">
        <div class="modal-header">
          <h5 class="modal-title">Registrar nuevo producto</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label for="nombreProducto" class="form-label">Nombre del producto</label>
            <input type="text" class="form-control" id="nombreProducto" name="nombre" required>
          </div>
          <div class="mb-3">
            <label for="descripcionProducto" class="form-label">Descripción</label>
            <textarea class="form-control" id="descripcionProducto" name="descripcion" rows="2"></textarea>
          </div>
          <div class="mb-3">
            <label for="categoriaProducto" class="form-label">Categoría</label>
            <select class="form-select" id="categoriaProducto" name="categoria" required>
              <option value="Comida">Comida</option>
              <option value="Combo">Combo</option>
              <option value="Promocion">Promoción</option>
              <option value="Servicio">Servicio</option>
            </select>
          </div>

          <!-- Nuevo: Horario -->
          <div class="mb-3">
            <label for="horarioProducto" class="form-label">Horario</label>
            <select class="form-select" id="horarioProducto" name="horario">
              <option value="dia">Menú del día</option>
              <option value="tarde">Menú de tarde</option>
              <option value="noche">Menú de noche</option>
            </select>
          </div>

          <div class="mb-3">
            <label for="precioUsd" class="form-label">Precio en dólares</label>
            <input type="number" step="0.01" class="form-control" id="precioUsd" name="precio_usd" required>
          </div>
          <div class="mb-3">
            <label for="imagenProducto" class="form-label">Imagen del producto</label>
            <input type="file" class="form-control" id="imagenProducto" name="imagen" accept="image/*" required>
            <div class="form-text">Se guardará automáticamente en uploads/ con el nombre del producto.</div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="submit" class="btn btn-success">Registrar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal: Editar Producto -->
  <div class="modal fade" id="modalEditarMenu" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <form id="formEditarMenu" class="modal-content" enctype="multipart/form-data" autocomplete="off">
        <div class="modal-header">
          <h5 class="modal-title">Editar producto</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="idProductoEditar" name="id">
          <div class="mb-3">
            <label for="nombreProductoEditar" class="form-label">Nombre del producto</label>
            <input type="text" class="form-control" id="nombreProductoEditar" name="nombre" required>
          </div>
          <div class="mb-3">
            <label for="descripcionProductoEditar" class="form-label">Descripción</label>
            <textarea class="form-control" id="descripcionProductoEditar" name="descripcion" rows="2"></textarea>
          </div>
          <div class="mb-3">
            <label for="categoriaProductoEditar" class="form-label">Categoría</label>
            <select class="form-select" id="categoriaProductoEditar" name="categoria" required>
              <option value="Comida">Comida</option>
              <option value="Combo">Combo</option>
              <option value="Promocion">Promoción</option>
              <option value="Servicio">Servicio</option>
            </select>
          </div>

          <!-- Nuevo: Horario en edición -->
          <div class="mb-3">
            <label for="horarioProductoEditar" class="form-label">Horario</label>
            <select class="form-select" id="horarioProductoEditar" name="horario">
              <option value="dia">Menú del día</option>
              <option value="tarde">Menú de tarde</option>
              <option value="noche">Menú de noche</option>
            </select>
          </div>

          <div class="mb-3">
            <label for="precioUsdEditar" class="form-label">Precio en dólares</label>
            <input type="number" step="0.01" class="form-control" id="precioUsdEditar" name="precio_usd" required>
          </div>
          <div class="mb-3">
            <label for="estadoProductoEditar" class="form-label">Estado</label>
            <select class="form-select" id="estadoProductoEditar" name="estado" required>
              <option value="Activo">Activo</option>
              <option value="No disponible">No disponible</option>
              <option value="En proceso">En proceso</option>
            </select>
          </div>
          <div class="mb-3">
            <label for="imagenProductoEditar" class="form-label">Actualizar imagen (opcional)</label>
            <input type="file" class="form-control" id="imagenProductoEditar" name="imagen" accept="image/*">
            <div class="form-text">Si no seleccionas imagen, se mantiene la actual.</div>
            <div class="mt-2">
              <img id="previewImagenActual" src="" alt="Imagen actual" class="img-fluid d-none" style="max-height:120px;">
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="submit" class="btn btn-primary">Actualizar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal: Confirmar eliminación -->
  <div class="modal fade" id="modalEliminarMenu" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Eliminar producto</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>
        <div class="modal-body">
          <p>¿Seguro que deseas eliminar este producto?</p>
          <input type="hidden" id="idProductoEliminar" name="id">
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-danger" id="btnConfirmarEliminarMenu">Eliminar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal: Advertencia (duplicado nombre o imagen existente) -->
  <div class="modal fade" id="modalAdvertencia" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header bg-warning">
          <h5 class="modal-title">Advertencia</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>
        <div class="modal-body">
          <p id="mensajeAdvertencia" class="mb-3"></p>
          <div id="contenedorImagenAdvertencia" class="d-none">
            <p class="mb-1"><strong>Imagen existente:</strong></p>
            <img id="imagenAdvertencia" src="" alt="Imagen existente" class="img-fluid" style="max-height:200px;">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-primary" id="btnContinuarAdvertencia">Continuar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts: session helper, advertencia modal helper -->
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const usuario = localStorage.getItem("usuarioActivo");
      const rol = localStorage.getItem("rolActivo");

      if (usuario && rol) {
        document.getElementById("userName").textContent = usuario;
        const roleBadge = document.getElementById("roleBadge");
        roleBadge.textContent = rol.charAt(0).toUpperCase() + rol.slice(1);
        if (rol === "gerente") roleBadge.className = "badge bg-warning text-dark me-3";
        else if (rol === "cajero") roleBadge.className = "badge bg-danger me-3";
        else roleBadge.className = "badge bg-success me-3";
      }

      // Logout: llamar logout.php y redirigir a index.html
      const btnLogout = document.getElementById("btnLogout");
      if (btnLogout) {
        btnLogout.addEventListener("click", async function(e) {
          e.preventDefault();
          try {
            await fetch('/Restaurante_Sonia_Burger/Restaurante_SB/logout.php', { method: 'POST', credentials: 'include' });
          } catch (err) { /* ignorar */ }
          localStorage.removeItem("usuarioActivo");
          localStorage.removeItem("rolActivo");
          localStorage.removeItem("usuarioActivoId");
          window.location.href = "/Restaurante_Sonia_Burger/Restaurante_SB/index.html";
        });
      }
    });

    // showAdvertencia helper (devuelve Promise)
    window.showAdvertencia = function(mensaje, imagenPath = null) {
      return new Promise((resolve) => {
        const modalEl = document.getElementById("modalAdvertencia");
        const mensajeEl = document.getElementById("mensajeAdvertencia");
        const contImg = document.getElementById("contenedorImagenAdvertencia");
        const imgEl = document.getElementById("imagenAdvertencia");
        const btnContinuar = document.getElementById("btnContinuarAdvertencia");

        mensajeEl.textContent = mensaje || "";
        if (imagenPath) {
          imgEl.src = imagenPath;
          contImg.classList.remove("d-none");
        } else {
          imgEl.src = "";
          contImg.classList.add("d-none");
        }

        const modal = new bootstrap.Modal(modalEl);
        modal.show();

        function onContinue() {
          cleanup();
          resolve(true);
        }
        function onHide() {
          cleanup();
          resolve(false);
        }
        function cleanup() {
          btnContinuar.removeEventListener("click", onContinue);
          modalEl.removeEventListener("hidden.bs.modal", onHide);
          try { modal.hide(); } catch(e) {}
        }

        btnContinuar.addEventListener("click", onContinue);
        modalEl.addEventListener("hidden.bs.modal", onHide);
      });
    };

    
  </script>
  <script>
document.addEventListener("DOMContentLoaded", function() {
  const usuario = localStorage.getItem("usuarioActivo");
  const rol = localStorage.getItem("rolActivo");

  if (usuario && rol) {
    document.getElementById("userName").textContent = usuario;
    const roleBadge = document.getElementById("roleBadge");
    roleBadge.textContent = rol.charAt(0).toUpperCase() + rol.slice(1);
    if (rol === "gerente") {
      roleBadge.className = "badge bg-warning text-dark me-3";
    } else if (rol === "cajero") {
      roleBadge.className = "badge bg-danger me-3";
    }
  }

  // Manejo de Cerrar sesión: llamar logout.php por POST, limpiar localStorage y redirigir a index.html
  const btnLogout = document.getElementById("btnLogout");
  if (btnLogout) {
    btnLogout.addEventListener("click", async function(e) {
      e.preventDefault(); // evitar navegación por defecto si es un <a>
      try {
        // Llamada al servidor para destruir sesión y actualizar last_login_at
        await fetch('/Restaurante_Sonia_Burger/Restaurante_SB/logout.php', {
          method: 'POST',
          credentials: 'include'
        });
      } catch (err) {
        // ignorar errores de red; igualmente limpiamos el cliente
        console.warn('Logout request failed:', err);
      } finally {
        // Limpiar estado local y redirigir al index (login)
        localStorage.removeItem("usuarioActivo");
        localStorage.removeItem("rolActivo");
        localStorage.removeItem("usuarioActivoId");
        window.location.href = "/Restaurante_Sonia_Burger/Restaurante_SB/gerente/index.html";
      }
    });
  }
});
</script>

  <!-- Bootstrap JS and app.js -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
