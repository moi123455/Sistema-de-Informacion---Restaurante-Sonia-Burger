  <script>
document.addEventListener("DOMContentLoaded", function() {
  const usuario = localStorage.getItem("usuarioActivo");
  const rol = localStorage.getItem("rolActivo");

  if (usuario && rol) {
    document.getElementById("userName").textContent = usuario;
    const roleBadge = document.getElementById("roleBadge");
    roleBadge.textContent = rol.charAt(0).toUpperCase() + rol.slice(1);
    if (rol === "gerente") {
      roleBadge.className = "badge bg-warning text-dark me-3";
    } else if (rol === "cajero") {
      roleBadge.className = "badge bg-danger me-3";
    }
  }

  // Manejo de Cerrar sesión: llamar logout.php por POST, limpiar localStorage y redirigir a index.html
  const btnLogout = document.getElementById("btnLogout");
  if (btnLogout) {
    btnLogout.addEventListener("click", async function(e) {
      e.preventDefault(); // evitar navegación por defecto si es un <a>
      try {
        // Llamada al servidor para destruir sesión y actualizar last_login_at
        await fetch('/Restaurante_Sonia_Burger/Restaurante_SB/logout.php', {
          method: 'POST',
          credentials: 'include'
        });
      } catch (err) {
        // ignorar errores de red; igualmente limpiamos el cliente
        console.warn('Logout request failed:', err);
      } finally {

        // Ocultar "Volver" si el rol es cajero (cajero.html)
document.addEventListener("DOMContentLoaded", function() {
  try {
    // Preferimos la sesión del servidor si existe; fallback a localStorage
    fetch('/Restaurante_Sonia_Burger/Restaurante_SB/verificar_sesion.php', { credentials: 'include' })
      .then(r => r.json())
      .then(data => {
        const role = (data && data.role) ? data.role : (localStorage.getItem('rolActivo') || '');
        if (role === 'cajero') {
          // Selector del botón "Volver" en tu navbar
          const btnVolver = document.querySelector('.btn-back');
          if (btnVolver) btnVolver.remove();

          // Si hay enlaces "volver" dentro de modales u otros contenedores
          document.querySelectorAll('.btn-back, .link-back').forEach(el => el.remove());
        }
      })
      .catch(() => {
        // Fallback: usar localStorage si la petición falla
        const role = localStorage.getItem('rolActivo') || '';
        if (role === 'cajero') {
          document.querySelectorAll('.btn-back, .link-back').forEach(el => el.remove());
        }
      });
  } catch (e) { console.warn('Error ocultando Volver:', e); }
});
      }
    });
  }
  
});

</script>
<script>
(function() {
  const VERIFY_URL = '/Restaurante_Sonia_Burger/Restaurante_SB/verificar_sesion.php';
  const LOGOUT_URL = '/Restaurante_Sonia_Burger/Restaurante_SB/logout.php';
  const BACK_SELECTORS = ['.btn-back', '.link-back', 'a.btn-volver', 'button.btn-volver'];

  function removeBackButtons() {
    BACK_SELECTORS.forEach(sel => {
      document.querySelectorAll(sel).forEach(el => {
        try { el.remove(); } catch(e) { el.style.display = 'none'; }
      });
    });
  }

  function applyRole(role) {
    if (!role) return;
    const r = String(role).trim().toLowerCase();
    console.debug('[role-check] detected role:', r);
    if (r === 'cajero') {
      removeBackButtons();
      document.documentElement.setAttribute('data-role-detected', 'cajero');
    } else {
      document.documentElement.setAttribute('data-role-detected', r);
    }
  }

  async function detectRoleOnce() {
    try {
      const resp = await fetch(VERIFY_URL, {
        credentials: 'include',
        headers: { 'Accept': 'application/json', 'X-Requested-With': 'XMLHttpRequest' }
      });
      // si no OK, fallback a localStorage
      if (!resp.ok) throw new Error('no-ok');
      const json = await resp.json();
      if (json && json.role) {
        applyRole(json.role);
        try { localStorage.setItem('rolActivo', String(json.role)); } catch(e){}
        return;
      }
    } catch (e) {
      console.warn('[role-check] fetch failed or returned non-json, using localStorage', e);
    }
    const roleLS = localStorage.getItem('rolActivo') || '';
    applyRole(roleLS);
  }

  // logout único y robusto
  function setupLogout() {
    const btnLogout = document.getElementById('btnLogout');
    if (!btnLogout) { console.warn('[logout] btnLogout not found'); return; }

    // remover listeners previos anónimos (no siempre posible), evitar duplicados con flag
    if (window.__logoutHandlerAttached) return;

    window.__logoutHandler = async function (e) {
      e && e.preventDefault();
      console.debug('[logout] clicked');
      try {
        const res = await fetch(LOGOUT_URL, {
          method: 'POST',
          credentials: 'include',
          headers: { 'Accept': 'application/json', 'X-Requested-With': 'XMLHttpRequest' }
        });
        console.debug('[logout] fetch status:', res.status);
      } catch (err) {
        console.warn('[logout] fetch error:', err);
      } finally {
        try {
          localStorage.removeItem("usuarioActivo");
          localStorage.removeItem("rolActivo");
          localStorage.removeItem("usuarioActivoId");
        } catch(e){}
        window.location.href = "/Restaurante_Sonia_Burger/Restaurante_SB/gerente/index.html";
      }
    };

    btnLogout.addEventListener('click', window.__logoutHandler);
    window.__logoutHandlerAttached = true;
    console.debug('[logout] handler attached');
  }

  document.addEventListener('DOMContentLoaded', () => {
    detectRoleOnce().finally(()=> setTimeout(() => detectRoleOnce(), 200));
    setupLogout();
    setTimeout(() => {
      const detected = (document.documentElement.getAttribute('data-role-detected') || '').toLowerCase();
      if (detected === 'cajero') removeBackButtons();
    }, 120);
  });

  // observar DOM para inyecciones dinámicas
  const observer = new MutationObserver(() => {
    const detected = (document.documentElement.getAttribute('data-role-detected') || '').toLowerCase();
    if (detected === 'cajero') {
      removeBackButtons();
      return;
    }
    if (!window.__roleCheckScheduled) {
      window.__roleCheckScheduled = true;
      setTimeout(() => { detectRoleOnce().finally(()=> window.__roleCheckScheduled = false); }, 300);
    }
    if (document.getElementById('btnLogout') && !window.__logoutHandlerAttached) setupLogout();
  });
  observer.observe(document.documentElement || document.body, { childList: true, subtree: true });

  window.addEventListener('storage', (e) => {
    if (e.key === 'rolActivo') applyRole(e.newValue || '');
    if (e.key === 'usuarioActivo' && !window.__logoutHandlerAttached) setupLogout();
  });
})();
</script>
