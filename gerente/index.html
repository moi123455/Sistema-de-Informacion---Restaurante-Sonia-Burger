<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema Restaurante - Login</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="header-container d-flex justify-content-between align-items-center p-3 bg-dark text-white">
   <img src="logo.png" alt="Logo" class="cajero-logo" />
    <h1 class="header-title">Sistema de gestion</h1>
    <nav>
      <ul class="list-inline m-0">
        <!-- Botón de Login -->
        <li class="list-inline-item" id="loginItem">
          <button id="btnOpenLogin" class="login-btn btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalLogin">Login</button>
        </li>
        <!-- Info de usuario logeado -->
        <li class="list-inline-item" id="userItem" style="display:none;">
          <span id="userName" class="fw-bold"></span>
          <span id="roleBadge" class="badge ms-2" style="display:none;">ROL</span>
          <button id="btnLogout" class="btn btn-danger btn-sm ms-2">Cerrar sesión</button>
        </li>
      </ul>
    </nav>
  </div>
</header>

<!-- Modal: Login -->
<div class="modal fade" id="modalLogin" tabindex="-1" aria-labelledby="modalLoginLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title w-100 text-center" id="modalLoginLabel">Iniciar Sesión</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form method="POST" action="/Restaurante_Sonia_Burger/Restaurante_SB/login.php" id="formLogin">
          <div class="mb-3">
            <label for="correo" class="form-label">Correo</label>
            <input type="text" class="form-control" id="correo" name="correo" required>
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Contraseña</label>
            <input type="password" class="form-control" id="password" name="password" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">Entrar</button>
          <div id="loginError" class="alert alert-danger mt-2" style="display:none;"></div>
        </form>
      </div>
    </div>
  </div>
</div>
<div style="height:120px;"></div>
<main class="container mt-10">
  <h2 class="text-center">Bienvenido al Sistema de Sonia Burger</h2>
  </h2>
</main>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.getElementById("formLogin").addEventListener("submit", function(e) {
  e.preventDefault(); // Evita recargar la página

  const formData = new FormData(this);

  fetch(this.action, {
    method: "POST",
    body: formData
  })
  .then(response => response.json())
  .then(data => {
    if (data.success) {
      // Guardar usuario y rol en localStorage
      localStorage.setItem("usuarioActivo", data.usuario);
      localStorage.setItem("rolActivo", data.rol);

      // Redirigir al panel correspondiente
      window.location.href = data.redirect;
    } else {
      const errorDiv = document.getElementById("loginError");
      errorDiv.textContent = data.message;
      errorDiv.style.display = "block";
    }
  })
  .catch(err => console.error("Error:", err));
});

// Mostrar usuario activo en el header si ya está logeado
document.addEventListener("DOMContentLoaded", function() {
  const usuario = localStorage.getItem("usuarioActivo");
  const rol = localStorage.getItem("rolActivo");

  if (usuario && rol) {
    document.getElementById("loginItem").style.display = "none";
    document.getElementById("userItem").style.display = "inline-block";

    document.getElementById("userName").textContent = usuario;

    const roleBadge = document.getElementById("roleBadge");
    roleBadge.style.display = "inline-block";
    roleBadge.textContent = rol.charAt(0).toUpperCase() + rol.slice(1);

    if (rol === "gerente") {
      roleBadge.className = "badge bg-warning text-dark ms-2";
    } else if (rol === "cajero") {
      roleBadge.className = "badge bg-danger ms-2";
    }
  }

  // Botón cerrar sesión
  document.getElementById("btnLogout").addEventListener("click", function() {
    localStorage.removeItem("usuarioActivo");
    localStorage.removeItem("rolActivo");
    window.location.href = "/Restaurante_Sonia_Burger/Restaurante_SB/index.html";
  });
});
</script>

</body>
</html>
